name: Fetch LoL Matches Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch matches from PandaScore API
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          from datetime import datetime, timedelta, timezone

          API_KEY = "ZvUEIwDlqCQ65wtI2RII_4klHEs42B-2F5zNQkZXquybECZETqo"
          BASE = "https://api.pandascore.co"

          def api_fetch(path):
              url = BASE + path + ("&" if "?" in path else "?") + "token=" + API_KEY
              req = urllib.request.Request(url, headers={"Accept": "application/json", "User-Agent": "LoL-Schedule-Bot/1.0"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      data = json.loads(r.read())
                      if isinstance(data, list):
                          return data
              except Exception as e:
                  print(f"  请求失败: {path[:60]}... -> {e}")
              return []

          now = datetime.now(timezone.utc)
          seven_days_ago = now - timedelta(days=7)
          rf = seven_days_ago.strftime("%Y-%m-%dT%H:%M:%SZ")
          rt = now.strftime("%Y-%m-%dT%H:%M:%SZ")
          ts = now.strftime("%Y-%m-%dT%H:%M:%SZ")

          print("Fetching running/upcoming...")
          running = api_fetch("/lol/matches?filter[status]=running,not_started&sort=begin_at&per_page=50")
          print(f"  -> {len(running)} matches")

          print("Fetching finished...")
          finished = api_fetch(f"/lol/matches?filter[status]=finished&range[begin_at]={rf},{rt}&sort=-begin_at&per_page=50")
          print(f"  -> {len(finished)} matches")

          # 安全检查：如果两个都是空的，不覆盖旧数据
          if len(running) == 0 and len(finished) == 0:
              print("WARNING: 两个接口都返回空数据，保留旧文件不覆盖")
              # 检查旧文件是否存在且有数据
              if os.path.exists("data/matches.json"):
                  with open("data/matches.json", "r") as f:
                      old = json.load(f)
                      old_total = len(old.get("running",[])) + len(old.get("finished",[]))
                      print(f"  旧文件有 {old_total} 条数据，保留")
              exit(0)

          os.makedirs("data", exist_ok=True)
          result = {"timestamp": ts, "running": running, "finished": finished}
          with open("data/matches.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False)

          total = len(running) + len(finished)
          print(f"Done: {total} matches saved at {ts}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git diff --staged --quiet || (git commit -m "chore: update matches data $(date -u +%H:%M)" && git push)
