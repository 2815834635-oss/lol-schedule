<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F7F7">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>LoL 赛事导航</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #1C1C1E;
  -webkit-font-smoothing: antialiased;
}

/* Phone frame — desktop only */
.phone-frame {
  width: 375px;
  height: 812px;
  background: #F7F7F7;
  border-radius: 44px;
  overflow: hidden;
  box-shadow: 0 30px 100px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  position: relative;
  border: 6px solid #2a2a3e;
}

/* Mobile fullscreen: remove frame */
@media (max-width: 500px) {
  html { background: #fff; }
  body { background: #fff; }
  .phone-frame {
    width: 100%; height: 100%;
    border-radius: 0; border: none;
    box-shadow: none; background: #fff;
  }
  .status-bar { display: none !important; height: 0 !important; }
  .nav-bar { display: none !important; height: 0 !important; }
  #page-schedule .nav-bar {
    display: flex !important; height: auto !important;
    padding: 12px 0 8px; padding-top: calc(12px + env(safe-area-inset-top));
    font-size: 20px; font-weight: 800;
  }
  .page.active > .search-header { padding-top: calc(8px + env(safe-area-inset-top)); }
  .page.active > .profile-header { padding-top: calc(8px + env(safe-area-inset-top)); }
  .detail-nav { padding-top: env(safe-area-inset-top); }
  .toast { position: fixed; }
  #hl-modal { position: fixed; }
}

.status-bar {
  height: 48px;
  background: #fff;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  font-size: 15px;
  font-weight: 600;
  color: #1C1C1E;
  padding-bottom: 6px;
  flex-shrink: 0;
}
.status-bar.dark { background: #0A1428; color: #fff; }

.nav-bar {
  height: 44px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  font-weight: 700;
  color: #1C1C1E;
  flex-shrink: 0;
  position: relative;
}
.nav-bar.dark { background: #0A1428; color: #fff; }
.nav-bar .back-btn {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: inherit; font-size: 16px; cursor: pointer; padding: 4px 8px;
  user-select: none;
}
.nav-bar .back-btn:active { opacity: 0.6; }

.page-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.page-content::-webkit-scrollbar { display: none; }

/* ====== Tab Bar ====== */
.tab-bar {
  background: #fff;
  display: flex;
  border-top: 0.5px solid #E5E5EA;
  flex-shrink: 0;
  padding: 6px 0;
  padding-bottom: calc(6px + env(safe-area-inset-bottom));
  position: relative;
  z-index: 10;
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  transition: all 0.15s ease;
  user-select: none;
}
.tab-item:active { transform: scale(0.9); }

.tab-icon-wrap {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}
.tab-icon-wrap svg { width: 28px; height: 28px; }

.tab-label { font-size: 12px; color: #8E8E93; font-weight: 500; }
.tab-item.active .tab-label { color: #0A8BFE; font-weight: 700; }

/* Pages */
.page { display: none; flex: 1; min-height: 0; }
.page.active { display: flex; flex-direction: column; }

/* ====== Common ====== */
.card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  transition: transform 0.1s ease, background 0.1s ease;
  cursor: pointer;
}
.card:active { transform: scale(0.97); background: #F5F5F5; }

.text-secondary { color: #8E8E93; }

/* ====== SCHEDULE PAGE ====== */
.region-bar {
  background: #fff;
  padding: 10px 0;
  box-shadow: 0 0.5px 0 rgba(0,0,0,0.06);
  flex-shrink: 0;
}
.region-list {
  display: flex; gap: 8px; padding: 0 12px;
  overflow-x: auto;
}
.region-list::-webkit-scrollbar { display: none; }
.region-item {
  padding: 6px 14px; font-size: 14px; color: #8E8E93; font-weight: 500;
  border-radius: 8px; background: #F0F0F0; cursor: pointer;
  white-space: nowrap; transition: all 0.15s ease; user-select: none;
}
.region-item:active { transform: scale(0.93); }
.region-item.active { color: #fff; font-weight: 600; background: #0A8BFE; }

.match-list { padding: 10px 12px; }

.section-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.section-title { font-size: 13px; font-weight: 600; color: #3C3C43; }

.live-dot {
  width: 6px; height: 6px; background: #0A8BFE; border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.5); }
}

/* Match Card */
.match-card { padding: 12px 14px; margin-bottom: 10px; }
.match-round { font-size: 11px; color: #8E8E93; margin-bottom: 8px; }
.match-teams { display: flex; align-items: center; justify-content: space-between; }
.team { display: flex; flex-direction: column; align-items: center; width: 75px; gap: 5px; }
.team-logo {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 14px; color: #fff;
}
.team-name { font-size: 14px; font-weight: 700; color: #1C1C1E; }

.match-center { display: flex; flex-direction: column; align-items: center; gap: 5px; }

.live-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: #0A8BFE; color: #fff; padding: 3px 10px;
  border-radius: 8px; font-size: 11px; font-weight: 700;
}
.vod-badge {
  background: #F0F0F0; color: #8E8E93; padding: 3px 10px;
  border-radius: 8px; font-size: 11px; font-weight: 600;
}

.score-area { display: flex; align-items: center; gap: 7px; }
.score { font-size: 24px; font-weight: 800; color: #1C1C1E; }
.score-divider { font-size: 16px; color: #C7C7CC; }

.spoiler-cover {
  background: #F0F0F0; padding: 5px 14px; border-radius: 8px;
  font-size: 12px; color: #8E8E93; cursor: pointer;
  transition: all 0.1s ease; user-select: none;
}
.spoiler-cover:active { background: #E5E5EA; transform: scale(0.93); }

.game-info { font-size: 11px; color: #8E8E93; }
.match-time { text-align: center; margin-top: 5px; font-size: 11px; color: #8E8E93; }

.match-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px; padding-top: 8px; border-top: 1px solid #E5E5EA;
}
.pog-badge { display: flex; align-items: center; gap: 5px; }
.pog-avatar { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #C8A951; }
.pog-tag {
  background: #C8A951; color: #000; font-size: 10px; font-weight: 700;
  padding: 1px 5px; border-radius: 4px;
}
.pog-name-text { font-size: 12px; font-weight: 600; color: #1C1C1E; }
.highlight-heroes { display: flex; gap: 3px; }
.hero-icon { width: 18px; height: 18px; border-radius: 4px; }

/* ====== DETAIL PAGE ====== */
.detail-page {
  display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 50; background: #F7F7F7; flex-direction: column;
}
.detail-page.active { display: flex; }

.detail-nav {
  height: 88px; background: #0A1428;
  display: flex; align-items: flex-end; padding: 0 16px 10px;
}
.detail-back-btn {
  color: #fff; font-size: 16px; cursor: pointer; padding: 4px 8px;
  transition: opacity 0.1s; user-select: none;
}
.detail-back-btn:active { opacity: 0.6; }
.detail-nav-title {
  flex: 1; text-align: center; color: #fff;
  font-size: 17px; font-weight: 700; margin-right: 40px;
}

.hero-section {
  padding: 24px 16px 20px;
  background: linear-gradient(180deg, #0A1428, #162a4a);
}
.detail-round { text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
.versus-row { display: flex; align-items: center; justify-content: space-between; }
.detail-team { display: flex; flex-direction: column; align-items: center; width: 100px; gap: 7px; }
.detail-team-logo {
  width: 60px; height: 60px; border-radius: 12px;
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 18px;
}
.detail-team-name { font-size: 15px; font-weight: 800; color: #fff; }
.versus-center { display: flex; flex-direction: column; align-items: center; gap: 7px; }
.detail-score { font-size: 34px; font-weight: 900; color: #fff; }
.detail-score-divider { font-size: 22px; color: rgba(255,255,255,0.25); margin: 0 4px; }

.detail-spoiler-btn {
  background: rgba(255,255,255,0.08); padding: 8px 18px; border-radius: 8px;
  color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1); transition: all 0.1s ease; user-select: none;
}
.detail-spoiler-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }

.status-badge { padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
.status-badge.live { background: #0A8BFE; color: #fff; }
.status-badge.finished { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }

.detail-cards { padding: 12px 12px 0; }
.detail-cards .card-block {
  background: #fff; border-radius: 12px; padding: 14px;
  margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
}
.pog-section { display: flex; align-items: center; gap: 10px; }
.pog-big-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #C8A951; }
.pog-tag-label { font-size: 11px; color: #C8A951; font-weight: 700; }
.pog-player-name { font-size: 15px; font-weight: 700; color: #1C1C1E; }
.card-block-title { font-size: 14px; font-weight: 700; color: #1C1C1E; margin-bottom: 10px; }
.highlight-item {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 9px; background: #F7F7F7; border-radius: 8px; margin-bottom: 6px;
}
.game-badge { background: #0A8BFE; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.hl-hero { width: 22px; height: 22px; border-radius: 5px; }
.hl-text { font-size: 13px; color: #3C3C43; }

.spoiler-hint {
  display: flex; align-items: center; gap: 8px;
  background: #F7F7F7; border: 1px solid #E5E5EA; border-radius: 12px;
  padding: 14px; margin-bottom: 10px; font-size: 13px; color: #8E8E93;
}

.action-section { padding: 8px 12px 24px; }
.btn-play {
  width: 100%; padding: 13px; background: #0A8BFE; color: #fff;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; margin-bottom: 10px; text-align: center;
  transition: all 0.1s ease; user-select: none;
}
.btn-play:active { transform: scale(0.97); opacity: 0.85; }

.action-group {
  display: flex; background: #fff; border-radius: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05); overflow: hidden;
}
.action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 13px 0; background: #F7F7F7; font-size: 14px; font-weight: 600;
  color: #0A8BFE; cursor: pointer; transition: all 0.1s ease; user-select: none;
}
.action-btn:active { transform: scale(0.96); background: #EBEBEB; }
.action-btn.active-want { background: rgba(10,139,254,0.06); }
.action-btn.active-watched { background: rgba(200,169,81,0.06); color: #C8A951; }
.action-divider-v { width: 1px; background: #E5E5EA; }

/* ====== SEARCH PAGE ====== */
.search-header {
  background: #fff; padding: 16px 12px 18px;
  box-shadow: 0 0.5px 0 rgba(0,0,0,0.06); flex-shrink: 0;
}
.search-title { font-size: 22px; font-weight: 800; color: #1C1C1E; margin-bottom: 3px; }
.search-subtitle { font-size: 13px; color: #8E8E93; margin-bottom: 12px; }
.search-box {
  display: flex; align-items: center; background: #F0F0F0;
  border-radius: 20px; padding: 0 12px; height: 40px; gap: 6px;
  border: 1px solid transparent; transition: all 0.3s ease;
}
.search-box.focused { border-radius: 12px; height: 46px; background: #F7F7F7; border-color: #E0E0E0; }
.search-icon-svg { font-size: 18px; color: #8E8E93; font-weight: 300; flex-shrink: 0; }
.search-box input {
  flex: 1; border: none; background: transparent;
  font-size: 14px; outline: none; color: #1C1C1E; font-family: inherit;
}
.search-box input::placeholder { color: #C7C7CC; font-size: 14px; }
.search-clear-btn {
  width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  background: #C7C7CC; border-radius: 50%; color: #fff; font-size: 12px;
  font-weight: 600; cursor: pointer; line-height: 1; flex-shrink: 0;
}

.hot-tags { padding: 14px 12px; }
.section-label {
  font-size: 12px; font-weight: 700; color: #8E8E93;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.hot-tag {
  background: #F0F0F0; padding: 6px 12px; border-radius: 8px;
  font-size: 13px; color: #0A8BFE; font-weight: 500;
  cursor: pointer; transition: all 0.1s ease; user-select: none;
}
.hot-tag:active { background: #E5E5EA; transform: scale(0.93); }

.rec-card {
  background: #fff; border-radius: 12px; margin: 0 12px 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;
  transition: transform 0.1s ease;
}
.rec-card:active { transform: scale(0.98); }
.rec-thumbnail {
  height: 130px; background: linear-gradient(135deg, #0A1428, #1a2744);
  display: flex; align-items: center; justify-content: center; position: relative;
}
.rec-hero-placeholder { width: 48px; height: 48px; border-radius: 10px; }
.rec-tags-area { position: absolute; bottom: 8px; left: 10px; display: flex; gap: 4px; }
.tag-gold {
  background: #C8A951; color: #000; padding: 2px 7px; border-radius: 8px;
  font-size: 10px; font-weight: 600;
}
.rec-info { padding: 10px 12px 6px; }
.rec-title { font-size: 14px; font-weight: 700; color: #1C1C1E; margin-bottom: 3px; }
.rec-desc { font-size: 12px; color: #8E8E93; line-height: 1.5; }
.rec-actions { display: flex; gap: 6px; padding: 6px 12px 10px; }
.rec-btn {
  padding: 5px 12px; border-radius: 8px; font-size: 12px;
  cursor: pointer; transition: all 0.1s ease; user-select: none;
}
.rec-btn:active { transform: scale(0.93); }
.rec-btn.want { background: #F0F0F0; color: #0A8BFE; font-weight: 500; }
.rec-btn.want.active { background: rgba(10,139,254,0.1); font-weight: 600; }
.rec-btn.detail { color: #8E8E93; border: 1px solid #E0E0E0; background: transparent; }

/* ====== PLAYER SEARCH RESULTS ====== */
.player-result-section { padding: 0 0 6px; }
.player-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 12px 10px; background: #fff;
  border-bottom: 1px solid #F0F0F0;
  position: sticky; top: 0; z-index: 2;
}
.player-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, #0A8BFE, #5AC8FA);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.player-meta { flex: 1; min-width: 0; }
.player-name { font-size: 15px; font-weight: 800; color: #1C1C1E; }
.player-team-role { font-size: 11px; color: #8E8E93; margin-top: 1px; }
.player-hl-count {
  font-size: 11px; color: #8E8E93; font-weight: 500;
  flex-shrink: 0; margin-left: auto;
}

.hl-list { display: flex; flex-direction: column; }

.hl-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: #fff;
  border-bottom: 1px solid #F5F5F5;
  cursor: pointer; transition: background 0.15s;
}
.hl-row:active { background: #F0F4FF; }
.hl-row:last-child { border-bottom: none; }

.hl-row-index {
  width: 20px; flex-shrink: 0;
  font-size: 13px; font-weight: 800; color: #C0C0C0; text-align: center;
}
.hl-row-index.top3 { color: #0A8BFE; }

.hl-row-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.hl-row-title {
  font-size: 13px; font-weight: 700; color: #1C1C1E; line-height: 1.35;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hl-row-sub {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #8E8E93;
}
.hl-row-sub span { white-space: nowrap; }
.hl-row-event {
  max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.hl-row-right { flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
.hl-row-score {
  font-size: 13px; font-weight: 800; color: #0A8BFE;
  background: rgba(10,139,254,0.08); padding: 2px 8px; border-radius: 6px;
}
.hl-row-priority {
  font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
}
.priority-s { background: #C8A951; color: #0A1428; }
.priority-msi { background: #5AC8FA; color: #fff; }
.priority-other { background: #EBEBEB; color: #8E8E93; }

.player-divider { height: 8px; background: #F0F0F0; }

/* ====== PROFILE PAGE ====== */
.profile-header {
  background: #fff; padding: 24px 12px 14px;
  box-shadow: 0 0.5px 0 rgba(0,0,0,0.06); flex-shrink: 0;
}
.user-info { display: flex; align-items: center; gap: 10px; }
.user-avatar-circle {
  width: 50px; height: 50px; border-radius: 50%;
  background: #F0F0F0; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #C7C7CC;
}
.user-name { font-size: 17px; font-weight: 800; color: #1C1C1E; }
.user-stats { font-size: 12px; color: #8E8E93; }

.list-tabs {
  display: flex; background: #fff; padding: 8px 12px; gap: 6px; flex-shrink: 0;
}
.list-tab {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 3px; padding: 9px 0; font-size: 13px; color: #8E8E93; font-weight: 500;
  border-radius: 8px; background: #F7F7F7; cursor: pointer;
  transition: all 0.15s ease; user-select: none;
}
.list-tab:active { transform: scale(0.95); }
.list-tab.active { color: #fff; font-weight: 600; background: #0A8BFE; }
.tab-count-badge {
  font-size: 10px; padding: 1px 5px; border-radius: 6px; font-weight: 600;
  background: rgba(0,0,0,0.08); color: inherit;
}
.list-tab.active .tab-count-badge { background: rgba(255,255,255,0.25); color: #fff; }

.list-content { padding: 10px 12px; }
.list-match-card {
  background: #fff; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; transition: all 0.1s ease;
}
.list-match-card:active { transform: scale(0.97); background: #F5F5F5; }
.list-team-group { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.list-team-logo { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #fff; }
.list-vs { font-size: 10px; color: #C7C7CC; font-weight: 600; }
.list-match-info { flex: 1; min-width: 0; }
.list-match-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-match-round { font-size: 11px; color: #8E8E93; }
.list-status-tag { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.tag-live-sm { background: #0A8BFE; color: #fff; }
.tag-vod-sm { background: #F0F0F0; color: #8E8E93; }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 50px 0; gap: 7px;
}
.empty-icon-block {
  width: 50px; height: 50px; border-radius: 12px;

function apiUrl(path) {
  const full = PANDASCORE + path + (path.includes('?') ? '&' : '?') + 'token=' + API_KEY;
  return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(full);
}
async function fetchWithFallback(path) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('timeout')), 10000);
    fetch(apiUrl(path)).then(resp => {
      clearTimeout(timer);
      if (!resp.ok) { reject(new Error('HTTP ' + resp.status)); return; }
      resolve(resp.json());
    }).catch(e => { clearTimeout(timer); reject(e); });
  });
}

// ====== 工具函数 ======
const WK = 'lol_watchlist';
function getWL() { try { return JSON.parse(localStorage.getItem(WK)) || {want:[],watching:[],watched:[]}; } catch(e) { return {want:[],watching:[],watched:[]}; } }
function saveWL(l) { localStorage.setItem(WK, JSON.stringify(l)); }
function addWant(id) { const l=getWL(); if(!l.want.includes(id)){l.want.push(id);l.watching=l.watching.filter(x=>x!==id);l.watched=l.watched.filter(x=>x!==id);saveWL(l);} return l; }
function markWatched(id) { const l=getWL(); if(!l.watched.includes(id)){l.watched.push(id);l.want=l.want.filter(x=>x!==id);l.watching=l.watching.filter(x=>x!==id);saveWL(l);} return l; }
function removeWL(id) { const l=getWL(); l.want=l.want.filter(x=>x!==id);l.watching=l.watching.filter(x=>x!==id);l.watched=l.watched.filter(x=>x!==id);saveWL(l); return l; }
function getStatus(id) { const l=getWL(); if(l.watched.includes(id))return'watched'; if(l.watching.includes(id))return'watching'; if(l.want.includes(id))return'want'; return'none'; }

function formatDate(d) {
  const t=new Date(), ts=t.toISOString().slice(0,10);
  const y=new Date(t); y.setDate(t.getDate()-1); const ys=y.toISOString().slice(0,10);
  if(d===ts)return'今天'; if(d===ys)return'昨天'; return d.slice(5).replace('-','/');
}

// ====== 赛程页 ======
const SchedulePage = {
  region: 'all',
  revealed: {},
  liveMatches: [],   // API 拉取的实时数据
  loading: false,
  apiLoaded: false,

  init() {
    const list = document.getElementById('region-list');
    list.innerHTML = regions.map(r =>
      `<div class="region-item ${r.id==='all'?'active':''}" onclick="SchedulePage.switchRegion('${r.id}',this)">${r.name}</div>`
    ).join('');
    this.render();
    this.fetchLiveData();
  },

  // 严格白名单：只显示这些联赛名（精确匹配 league.name）
  majorNames: new Set(['LPL','LCK','LEC','LCS','Worlds','MSI','All-Star','Esports World Cup']),

  isMajorLeague(name) {
    return this.majorNames.has(name);
  },

  async fetchLiveData() {
    this.loading = true;
    this.render();

    const now = new Date();
    const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
    const rangeFrom = sevenDaysAgo.toISOString();
    const rangeTo = now.toISOString();

    try {
      const results = await Promise.all([
        fetchWithFallback(`/lol/matches?filter[status]=running,not_started&sort=begin_at&per_page=50`),
        fetchWithFallback(`/lol/matches?filter[status]=finished&range[begin_at]=${rangeFrom},${rangeTo}&sort=-begin_at&per_page=50`)
      ]);

      const allApi = [...results[0], ...results[1]];
      this.liveMatches = allApi.map(m => this.parseApiMatch(m)).filter(Boolean);
      this.apiLoaded = true;

      matches.length = 0;
      this.liveMatches.forEach(am => matches.push(am));

    } catch (err) {
      console.error('API 拉取失败，使用 mock 数据:', err);
      this.apiLoaded = false;
    }

    this.loading = false;
    this.render();
  },

  parseApiMatch(apiMatch) {
    const team1 = apiMatch.opponents?.[0]?.opponent;
    const team2 = apiMatch.opponents?.[1]?.opponent;
    if (!team1 || !team2) return null;

    const leagueName = apiMatch.league?.name || '';
    if (!this.isMajorLeague(leagueName)) return null;

    const t1Name = team1.acronym || team1.name || 'TBD';
    const t2Name = team2.acronym || team2.name || 'TBD';
    const score1 = apiMatch.results?.[0]?.score ?? 0;
    const score2 = apiMatch.results?.[1]?.score ?? 0;

    const regionMap = {'LPL':'lpl','LCK':'lck','LEC':'lec','LCS':'lcs','Esports World Cup':'lcs'};
    let region = regionMap[leagueName] || 'worlds';

    // 状态
    let status = 'finished';
    if (apiMatch.status === 'running') status = 'live';
    else if (apiMatch.status === 'not_started') status = 'upcoming';
    else if (apiMatch.status === 'finished') status = 'finished';

    // 时间（转本地时区）
    const beginAt = apiMatch.begin_at ? new Date(apiMatch.begin_at) : new Date();
    const y = beginAt.getFullYear();
    const mo = String(beginAt.getMonth()+1).padStart(2,'0');
    const d = String(beginAt.getDate()).padStart(2,'0');
    const dateStr = `${y}-${mo}-${d}`;
    const timeStr = beginAt.toTimeString().slice(0, 5);

    // 赛事名
    const serieName = apiMatch.serie?.full_name || '';
    const leagueDisplay = apiMatch.league?.name || leagueName;
    const round = serieName ? `${leagueDisplay} · ${serieName}` : leagueDisplay;

    // 当前局数（running 时）
    let currentGame = null;
    if (status === 'live' && apiMatch.number_of_games) {
      currentGame = score1 + score2 + 1;
      if (currentGame > apiMatch.number_of_games) currentGame = apiMatch.number_of_games;
    }

    // 注册队伍颜色（如果没有的话）
    if (!teamColors[t1Name]) teamColors[t1Name] = this.hashColor(t1Name);
    if (!teamColors[t2Name]) teamColors[t2Name] = this.hashColor(t2Name);

    return {
      id: 'api_' + apiMatch.id,
      region: region,
      status: status,
      round: round,
      startTime: timeStr,
      date: dateStr,
      teamA: { name: t1Name },
      teamB: { name: t2Name },
      score: { a: score1, b: score2 },
      currentGame: currentGame,
      pog: null,
      highlights: [],
      vodUrl: apiMatch.streams_list?.[0]?.raw_url || apiMatch.official_stream_url || ''
    };
  },

  // 根据队名生成一个稳定的颜色
  hashColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    const h = Math.abs(hash) % 360;
    return `hsl(${h}, 55%, 45%)`;
  },

  switchRegion(id, el) {
    document.querySelectorAll('.region-item').forEach(r=>r.classList.remove('active'));
    el.classList.add('active');
    this.region = id;
    this.revealed = {};
    this.render();
  },

  reveal(id) { this.revealed[id]=true; this.render(); },

  render() {
    const c = document.getElementById('schedule-content');
    if (!c) return;
    const all = this.region === 'all' ? matches : matches.filter(m=>m.region===this.region);
    const live = all.filter(m=>m.status==='live');
    const upcoming = all.filter(m=>m.status==='upcoming');
    const done = all.filter(m=>m.status==='finished');
    const rn = regions.find(r=>r.id===this.region)?.name||'';

    let h = '<div class="match-list">';

    // 加载中提示
    if(this.loading) {
      h += '<div class="empty-state" style="padding:30px 0"><span class="empty-text" style="color:#0A8BFE">加载实时赛程中...</span></div>';
    }

    if(live.length) {
      h += '<div class="section-header"><div class="live-dot"></div><span class="section-title">直播中</span></div>';
      live.forEach(m => { h += this.card(m, 'live'); });
    }
    if(upcoming.length) {
      h += '<div class="section-header"'+(live.length?' style="margin-top:4px"':'')+'><span class="section-title">即将开始</span></div>';
      upcoming.forEach(m => { h += this.card(m, 'upcoming'); });
    }
    if(done.length) {
      h += '<div class="section-header"'+((live.length||upcoming.length)?' style="margin-top:4px"':'')+'><span class="section-title">已结束</span></div>';
      done.forEach(m => { h += this.card(m, 'finished'); });
    }
    if(!this.loading && !live.length && !upcoming.length && !done.length) {
      h += `<div class="empty-state"><div class="empty-icon-block">?</div><span class="empty-text">暂无 ${rn} 赛事</span></div>`;
    }
    h += '</div>';
    c.innerHTML = h;
  },

  card(m, type) {
    const isLive = type === 'live';
    const isUpcoming = type === 'upcoming';
    const shown = !!this.revealed[m.id];
    const dl = (!isLive && !isUpcoming) ? ' · '+formatDate(m.date) : '';
    let h = `<div class="card match-card" onclick="DetailPage.show('${m.id}')">`;
    h += `<div class="match-round">${m.round}${dl}</div>`;
    h += '<div class="match-teams">';
    h += `<div class="team">${teamLogo(m.teamA.name)}<span class="team-name">${m.teamA.name}</span></div>`;
    h += '<div class="match-center">';

    if (isLive) {
      h += `<div class="live-badge"><div class="live-dot" style="width:5px;height:5px;background:#fff"></div> LIVE</div>`;
    } else if (isUpcoming) {
      h += `<div class="vod-badge" style="background:#E8F4FD;color:#0A8BFE">即将开始</div>`;
    } else {
      h += '<div class="vod-badge">VOD</div>';
    }

    if (isUpcoming) {
      h += `<span class="game-info">${m.startTime}</span>`;
    } else if(shown) {
      h += `<div class="score-area"><span class="score">${m.score.a}</span><span class="score-divider">:</span><span class="score">${m.score.b}</span></div>`;
    } else {
      h += `<div class="spoiler-cover" onclick="event.stopPropagation();SchedulePage.reveal('${m.id}')">${isLive?'点击显示':'点击显示比分'}</div>`;
    }
    if(isLive && m.currentGame) h += `<span class="game-info">第${m.currentGame}局进行中</span>`;
    h += '</div>';
    h += `<div class="team">${teamLogo(m.teamB.name)}<span class="team-name">${m.teamB.name}</span></div>`;
    h += '</div>';
    if(isLive || isUpcoming) h += `<div class="match-time">${m.startTime} 开赛</div>`;
    if(!isLive && !isUpcoming && m.pog) {
      h += '<div class="match-footer"><div class="pog-badge">';
      h += `<div class="pog-avatar" style="background:${pogAvatar(m.pog.name)}"></div>`;
      h += `<span class="pog-tag">POG</span><span class="pog-name-text">${m.pog.name}</span></div>`;
      h += '<div class="highlight-heroes">';
      m.highlights.forEach(hl => { h += heroIcon(hl.hero); });
      h += '</div></div>';
    }
    h += '</div>';
    return h;
  }
};

// ====== 详情页 ======
const DetailPage = {
  match: null,
  shown: false,
  watchSt: 'none',

  show(id) {
    this.match = matches.find(m=>m.id===id);
    if(!this.match) return;
    this.shown = false;
    this.watchSt = getStatus(id);
    document.getElementById('status-bar').className = 'status-bar dark';
    this.render();
    document.getElementById('detail-page').classList.add('active');
  },

  hide() {
    document.getElementById('detail-page').classList.remove('active');
    document.getElementById('status-bar').className = 'status-bar';
  },

  revealScore() { this.shown=true; this.render(); },

  render() {
    const m=this.match; if(!m)return;
    const c=document.getElementById('detail-content');
    let h = '<div class="hero-section">';
    h += `<div class="detail-round">${m.round}</div>`;
    h += '<div class="versus-row">';
    h += `<div class="detail-team"><div class="detail-team-logo" style="color:${teamTextColors[m.teamA.name]||'#fff'};background:${teamColors[m.teamA.name]?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.08)'}">${m.teamA.name}</div><span class="detail-team-name">${m.teamA.name}</span></div>`;
    h += '<div class="versus-center">';
    if(this.shown) {
      h += `<div class="score-area"><span class="detail-score">${m.score.a}</span><span class="detail-score-divider">:</span><span class="detail-score">${m.score.b}</span></div>`;
    } else {
      h += '<div class="detail-spoiler-btn" onclick="DetailPage.revealScore()">点击显示比分</div>';
    }
    h += `<div class="status-badge ${m.status==='live'?'live':'finished'}">${m.status==='live'?'直播中':'已结束'}</div>`;
    h += '</div>';
    h += `<div class="detail-team"><div class="detail-team-logo" style="color:${teamTextColors[m.teamB.name]||'#fff'};background:rgba(255,255,255,0.08)">${m.teamB.name}</div><span class="detail-team-name">${m.teamB.name}</span></div>`;
    h += '</div></div>';

    h += '<div class="detail-cards">';
    if(!this.shown && m.highlights.length) {
      h += '<div class="spoiler-hint">显示比分后解锁局数看点和 POG 信息</div>';
    }
    if(this.shown && m.pog) {
      h += '<div class="card-block"><div class="pog-section">';
      h += `<div class="pog-big-avatar" style="background:${pogAvatar(m.pog.name)}"></div>`;
      h += `<div><div class="pog-tag-label">POG 本场最佳</div><div class="pog-player-name">${m.pog.name}</div></div>`;
      h += '</div></div>';
    }
    if(this.shown && m.highlights.length) {
      h += '<div class="card-block"><div class="card-block-title">局数看点</div>';
      m.highlights.forEach(hl => {
        h += `<div class="highlight-item"><span class="game-badge">G${hl.game}</span><div class="hl-hero" style="background:${heroColors[hl.hero.id]||'#888'}"></div><span class="hl-text">${hl.text}</span></div>`;
      });
      h += '</div>';
    }
    h += '</div>';

    h += '<div class="action-section">';
    if(m.vodUrl) h += `<div class="btn-play" onclick="DetailPage.play()">前往官方播放</div>`;
    h += '<div class="action-group">';
    h += `<div class="action-btn ${this.watchSt==='want'?'active-want':''}" onclick="DetailPage.toggleWant()">${this.watchSt==='want'?'已想看':'想看'}</div>`;
    h += '<div class="action-divider-v"></div>';
    h += `<div class="action-btn ${this.watchSt==='watched'?'active-watched':''}" onclick="DetailPage.toggleWatched()">${this.watchSt==='watched'?'已看完':'标记已看'}</div>`;
    h += '</div></div>';

    c.innerHTML = h;
  },

  play() {
    if(this.match?.vodUrl) {
      if(navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(this.match.vodUrl).then(()=>showToast('链接已复制')).catch(()=>showToast('链接已复制'));
      } else showToast('链接已复制');
    }
  },

  toggleWant() {
    const id=this.match.id;
    if(this.watchSt==='want'){removeWL(id);this.watchSt='none';showToast('已移除');}
    else{addWant(id);this.watchSt='want';showToast('已添加到想看');}
    this.render();
  },

  toggleWatched() {
    const id=this.match.id;
    if(this.watchSt==='watched'){removeWL(id);this.watchSt='none';showToast('已移除');}
    else{markWatched(id);this.watchSt='watched';showToast('已标记看完');}
    this.render();
  }
};

// ====== 搜索页 ======
const SearchPage = {
  keyword: '',
  hotTags: ['Faker','Uzi','TheShy','Chovy','Caps','Knight','Deft','Rookie'],
  recs: [],
  playersData: [],
  playerResults: [],

  _debounceTimer: null,

  init() {
    this.playersData = (typeof PLAYERS_DB !== 'undefined') ? PLAYERS_DB : [];
    this.loadRecs();
    const input = document.getElementById('search-input');
    const box = document.getElementById('search-box');
    input.addEventListener('focus', ()=>box.classList.add('focused'));
    input.addEventListener('blur', ()=>box.classList.remove('focused'));
    input.addEventListener('input', e=>{
      this.keyword=e.target.value;
      document.getElementById('search-clear').style.display=this.keyword?'flex':'none';
      clearTimeout(this._debounceTimer);
      this._debounceTimer = setTimeout(()=>this.doSearch(), 300);
    });
    input.addEventListener('keydown', e=>{ if(e.key==='Enter'){e.preventDefault();clearTimeout(this._debounceTimer);this.doSearch();} });
    this.render();
  },

  loadRecs() {
    const wl=getWL();
    this.recs = aiRecommendations.map(i=>({...i, isWanted:i.matchId?wl.want.includes(i.matchId):false}));
  },

  onClear() {
    this.keyword='';
    this.playerResults=[];
    document.getElementById('search-input').value='';
    document.getElementById('search-clear').style.display='none';
    this.loadRecs(); this.render();
  },

  onTag(tag) {
    this.keyword=tag;
    document.getElementById('search-input').value=tag;
    document.getElementById('search-clear').style.display='flex';
    this.doSearch();
  },

  doSearch() {
    const kw=this.keyword.toLowerCase().trim();
    if(!kw){this.playerResults=[];this.loadRecs();this.render();return;}

    this.playerResults = this.playersData.filter(p =>
      p.id.toLowerCase().includes(kw) ||
      p.name.toLowerCase().includes(kw) ||
      p.team.toLowerCase().includes(kw) ||
      (p.keywords && p.keywords.some(k => k.toLowerCase().includes(kw))) ||
      (p.highlights && p.highlights.some(h =>
        h.title.toLowerCase().includes(kw) ||
        h.opponent.toLowerCase().includes(kw) ||
        h.event.toLowerCase().includes(kw)
      ))
    );

    // 同时搜索旧的 AI 推荐
    const wl=getWL();
    this.recs = aiRecommendations
      .filter(i=>i.title.toLowerCase().includes(kw)||i.description.toLowerCase().includes(kw)||i.tags.some(t=>t.toLowerCase().includes(kw)))
      .map(i=>({...i,isWanted:i.matchId?wl.want.includes(i.matchId):false}));

    this.render();
  },

  wantTap(matchId) {
    if(!matchId){showToast('经典对局暂不支持');return;}
    if(getStatus(matchId)==='want'){removeWL(matchId);showToast('已移除想看');}
    else{addWant(matchId);showToast('已添加想看');}
    this.loadRecs(); this.render();
  },

  _priorityClass(p) {
    if (!p) return 'priority-other';
    if (/S赛|全球总决赛/i.test(p)) return 'priority-s';
    if (/MSI/i.test(p)) return 'priority-msi';
    return 'priority-other';
  },

  _priorityLabel(p) {
    if (!p) return '';
    if (/S赛|全球总决赛/i.test(p)) return 'S赛';
    if (/MSI/i.test(p)) return 'MSI';
    if (/亚运/i.test(p)) return '亚运';
    return p.length > 6 ? p.slice(0,6) : p;
  },

  render() {
    const c=document.getElementById('search-content');
    let h='';

    // 无关键词：热门标签 + 推荐
    if(!this.keyword) {
      h += '<div class="hot-tags"><div class="section-label">热门搜索</div><div class="tags-wrap">';
      this.hotTags.forEach(t=>{ h+=`<div class="hot-tag" onclick="SearchPage.onTag('${t}')">${t}</div>`; });
      h += '</div></div>';
      h += '<div style="padding:0 12px"><div class="section-label">为你推荐</div></div>';
      this.recs.forEach(i => { h += this._renderRecCard(i); });
      c.innerHTML = h;
      return;
    }

    // 有关键词：选手搜索结果
    h += '<div style="padding:0 12px"><div class="section-label">搜索结果</div></div>';

    if (this.playerResults.length > 0) {
      this.playerResults.forEach((player, pi) => {
        h += '<div class="player-result-section">';
        h += '<div class="player-header">';
        h += `<div class="player-avatar">${player.name.charAt(0).toUpperCase()}</div>`;
        h += '<div class="player-meta">';
        h += `<div class="player-name">${player.name}</div>`;
        h += `<div class="player-team-role">${player.team} · ${player.role}</div>`;
        h += '</div>';
        h += `<div class="player-hl-count">${player.highlights.length} 场高光</div>`;
        h += '</div>';
        h += '<div class="hl-list">';
        player.highlights.forEach((hl, hi) => {
          const pLabel = this._priorityLabel(hl.priority);
          const pClass = this._priorityClass(hl.priority);
          h += `<div class="hl-row" onclick="SearchPage.showHighlight('${player.id}',${hi})">`;
          h += `<div class="hl-row-index ${hi < 3 ? 'top3' : ''}">${hi + 1}</div>`;
          h += '<div class="hl-row-body">';
          h += `<div class="hl-row-title">${hl.title}</div>`;
          h += '<div class="hl-row-sub">';
          h += `<span class="hl-row-event">${hl.event}</span>`;
          h += `<span>·</span><span>vs ${hl.opponent}</span>`;
          h += `<span>·</span><span>${hl.date.slice(0, 4)}</span>`;
          h += '</div></div>';
          h += '<div class="hl-row-right">';
          if (pLabel) h += `<div class="hl-row-priority ${pClass}">${pLabel}</div>`;
          h += `<div class="hl-row-score">${hl.score}</div>`;
          h += '</div></div>';
        });
        h += '</div></div>';
        if (pi < this.playerResults.length - 1) {
          h += '<div class="player-divider"></div>';
        }
      });
    }

    // 旧推荐结果（如果有）
    if (this.recs.length > 0) {
      if (this.playerResults.length > 0) h += '<div class="player-divider"></div>';
      h += '<div style="padding:14px 12px 0"><div class="section-label">相关推荐</div></div>';
      this.recs.forEach(i => { h += this._renderRecCard(i); });
    }

    // 全空
    if (!this.playerResults.length && !this.recs.length) {
      h += '<div class="empty-state"><div class="empty-icon-block">?</div><span class="empty-text">未找到相关选手或对局</span><span style="font-size:12px;color:#8E8E93">试试换个选手 ID 或英雄名搜索</span></div>';
    }

    c.innerHTML = h;
  },

  _renderRecCard(i) {
    let h = '<div class="rec-card">';
    h += `<div class="rec-thumbnail"><div class="rec-hero-placeholder" style="background:${heroColors[i.hero?.id]||'#888'}"></div>`;
    h += '<div class="rec-tags-area">';
    (i.tags||[]).forEach(t=>{ h+=`<span class="tag-gold">${t}</span>`; });
    h += '</div></div>';
    h += `<div class="rec-info"><div class="rec-title">${i.title}</div><div class="rec-desc">${i.description}</div></div>`;
    h += '<div class="rec-actions">';
    h += `<div class="rec-btn want ${i.isWanted?'active':''}" onclick="event.stopPropagation();SearchPage.wantTap(${i.matchId?"'"+i.matchId+"'":"null"})">${i.isWanted?'已想看':'想看'}</div>`;
    if(i.matchId) h += `<div class="rec-btn detail" onclick="event.stopPropagation();DetailPage.show('${i.matchId}')">查看详情</div>`;
    h += '</div></div>';
    return h;
  },

  showHighlight(playerId, hlIndex) {
    const player = this.playersData.find(p => p.id === playerId);
    if (!player || !player.highlights[hlIndex]) return;
    const hl = player.highlights[hlIndex];
    // 弹出详情浮层
    this._showHighlightModal(player, hl);
  },

  _showHighlightModal(player, hl) {
    // 移除旧浮层
    const old = document.getElementById('hl-modal');
    if (old) old.remove();

    const pLabel = this._priorityLabel(hl.priority);
    const pClass = this._priorityClass(hl.priority);

    const modal = document.createElement('div');
    modal.id = 'hl-modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;display:flex;align-items:center;justify-content:center;overflow:hidden;';
    modal.innerHTML = `
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);" onclick="document.getElementById('hl-modal').remove()"></div>
      <div style="position:relative;width:85%;max-width:340px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div style="background:linear-gradient(135deg,#0A1428,#1a2744);padding:20px 16px;position:relative;">
          ${pLabel ? `<span class="hl-card-priority ${pClass}" style="position:absolute;top:12px;right:12px;">${pLabel}</span>` : ''}
          <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:6px;">${hl.event}</div>
          <div style="font-size:17px;font-weight:800;color:#fff;line-height:1.4;">${hl.title}</div>
        </div>
        <div style="padding:16px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
            <div class="player-avatar" style="width:32px;height:32px;font-size:13px;">${player.name.charAt(0).toUpperCase()}</div>
            <div>
              <div style="font-size:14px;font-weight:700;color:#1C1C1E;">${player.name}</div>
              <div style="font-size:11px;color:#8E8E93;">${player.team} · ${player.role}</div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid #F0F0F0;border-bottom:1px solid #F0F0F0;margin-bottom:12px;">
            <div>
              <div style="font-size:12px;color:#8E8E93;">对手</div>
              <div style="font-size:14px;font-weight:600;color:#1C1C1E;">${hl.opponent}</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:12px;color:#8E8E93;">比分</div>
              <div style="font-size:18px;font-weight:800;color:#0A8BFE;">${hl.score}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:12px;color:#8E8E93;">日期</div>
              <div style="font-size:14px;font-weight:600;color:#1C1C1E;">${hl.date}</div>
            </div>
          </div>
          <div style="font-size:13px;color:#3C3C43;line-height:1.6;">${hl.description}</div>
        </div>
        <div style="padding:0 16px 16px;">
          <div onclick="document.getElementById('hl-modal').remove()" style="background:#0A8BFE;color:#fff;text-align:center;padding:12px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">关闭</div>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }
};

// ====== 个人页 ======
const ProfilePage = {
  tab: 'want',

  render() {
    const wl=getWL();
    const wantM=matches.filter(m=>wl.want.includes(m.id));
    const watchingM=matches.filter(m=>wl.watching.includes(m.id));
    const watchedM=matches.filter(m=>wl.watched.includes(m.id));

    document.getElementById('user-stats').textContent = `已看 ${watchedM.length} 场 · 想看 ${wantM.length} 场`;

    // tabs
    const tabs=document.getElementById('profile-tabs');
    tabs.innerHTML = [
      {k:'want',l:'想看',c:wantM.length},
      {k:'watched',l:'已看',c:watchedM.length}
    ].map(t=>`<div class="list-tab ${this.tab===t.k?'active':''}" onclick="ProfilePage.switchTab('${t.k}')">${t.l}${t.c?` <span class="tab-count-badge">${t.c}</span>`:''}</div>`).join('');

    let list=[];
    let emptyL='W', emptyT='还没有想看的比赛', showAction=false;
    if(this.tab==='want'){list=wantM;emptyL='W';emptyT='还没有想看的比赛';showAction=true;}
    else{list=watchedM;emptyL='H';emptyT='还没有看完的比赛';}

    const lc=document.getElementById('profile-list');
    if(list.length) {
      lc.innerHTML = list.map(m=>`
        <div class="list-match-card" onclick="DetailPage.show('${m.id}')">
          <div class="list-team-group">
            ${teamLogoSm(m.teamA.name)}
            <span class="list-vs">vs</span>
            ${teamLogoSm(m.teamB.name)}
          </div>
          <div class="list-match-info">
            <div class="list-match-title">${m.teamA.name} vs ${m.teamB.name}</div>
            <div class="list-match-round">${m.round}</div>
          </div>
          <span class="list-status-tag ${m.status==='live'?'tag-live-sm':'tag-vod-sm'}">${m.status==='live'?'LIVE':'VOD'}</span>
        </div>
      `).join('');
    } else {
      lc.innerHTML = `<div class="empty-state"><div class="empty-icon-block">${emptyL}</div><span class="empty-text">${emptyT}</span>${showAction?'<div class="empty-action-btn" onclick="switchTab(\'page-schedule\',0)">去赛程页逛逛</div>':''}</div>`;
    }
  },

  switchTab(t) { this.tab=t; this.render(); }
};

// ====== 初始化 ======
document.addEventListener('DOMContentLoaded', () => {
  SchedulePage.init();
  SearchPage.init();
  ProfilePage.render();
});
</script>
